<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投研会议 - AlphaMind</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部导航 */
        .chat-header {
            background: linear-gradient(135deg, #1677ff 0%, #69b1ff 100%);
            color: #fff;
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.9;
            transition: opacity 0.2s;
        }

        .back-btn:hover {
            opacity: 1;
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            flex: 1;
            text-align: center;
        }

        .header-info {
            font-size: 13px;
            text-align: center;
            margin-top: 4px;
            opacity: 0.85;
        }

        /* 状态栏 */
        .status-bar {
            background: #fff;
            padding: 12px 20px;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 72px;
            z-index: 99;
        }

        .phase-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .phase-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #e8e8e8;
            color: #999;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .phase-dot.active {
            background: #1677ff;
            color: #fff;
            box-shadow: 0 0 0 3px rgba(22, 119, 255, 0.2);
        }

        .phase-dot.completed {
            background: #52c41a;
            color: #fff;
        }

        .phase-name {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }

        .meeting-id {
            font-size: 12px;
            color: #999;
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 系统消息 */
        .message.system {
            display: flex;
            justify-content: center;
        }

        .system-bubble {
            background: rgba(0,0,0,0.04);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            color: #666;
            max-width: 85%;
            text-align: center;
            line-height: 1.5;
        }

        .system-bubble.highlight {
            background: #fff8e1;
            border: 1px solid #ffd591;
            color: #d48806;
        }

        /* 顾问消息 */
        .message.advisor {
            display: flex;
            gap: 10px;
            max-width: 92%;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #722ed1 0%, #9e6de5 100%);
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .avatar.host {
            background: linear-gradient(135deg, #1677ff 0%, #69b1ff 100%);
        }

        .avatar.value {
            background: linear-gradient(135deg, #52c41a 0%, #73d13d 100%);
        }

        .avatar.tech {
            background: linear-gradient(135deg, #fa8c16 0%, #ffc53d 100%);
        }

        .avatar.quant {
            background: linear-gradient(135deg, #13c2c2 0%, #36cfc9 100%);
        }

        .message-content {
            flex: 1;
            min-width: 0;
        }

        .message-name {
            font-size: 12px;
            color: #999;
            margin-bottom: 3px;
        }

        .message-bubble {
            background: #fff;
            padding: 10px 14px;
            border-radius: 10px;
            border-left: 3px solid #722ed1;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
            font-size: 14px;
            line-height: 1.5;
            color: #333;
            word-break: break-word;
        }

        .message-bubble.host-bubble {
            border-left-color: #1677ff;
        }

        .message-meta {
            font-size: 11px;
            color: #999;
            margin-top: 3px;
        }

        /* 加载指示器 */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 14px;
            background: rgba(0,0,0,0.02);
            border-radius: 6px;
            max-width: 180px;
        }

        .typing-dots {
            display: flex;
            gap: 3px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #999;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-3px); }
        }

        .typing-text {
            font-size: 12px;
            color: #666;
        }

        /* 选择题弹框 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }

        .modal-box {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            text-align: center;
        }

        .modal-item {
            margin-bottom: 12px;
        }

        .modal-question {
            font-size: 13px;
            color: #333;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .modal-options {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .modal-option {
            padding: 6px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            background: #fff;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-option:hover {
            border-color: #1677ff;
        }

        .modal-option.selected {
            background: #1677ff;
            color: #fff;
            border-color: #1677ff;
        }

        .modal-submit {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #1677ff 0%, #69b1ff 100%);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 12px;
            transition: transform 0.2s;
        }

        .modal-submit:hover {
            transform: scale(1.02);
        }

        /* 采集选项卡片 */
        .collection-cards {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .collection-card {
            flex: 1;
            padding: 10px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .collection-card:hover {
            border-color: #1677ff;
        }

        .collection-card.selected {
            border-color: #1677ff;
            background: #e6f4ff;
        }

        .collection-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .card-name {
            font-size: 13px;
            font-weight: 500;
            color: #333;
        }

        .card-desc {
            font-size: 11px;
            color: #999;
            margin-top: 2px;
        }

        /* 底部操作区 */
        .action-bar {
            background: #fff;
            padding: 12px 20px;
            border-top: 1px solid #e8e8e8;
            display: flex;
            gap: 10px;
            position: sticky;
            bottom: 0;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #1677ff 0%, #69b1ff 100%);
            color: #fff;
        }

        .action-btn.secondary {
            background: #f5f5f5;
            color: #333;
        }

        .action-btn:hover {
            transform: scale(1.02);
        }

        .action-btn svg {
            width: 16px;
            height: 16px;
        }

        .hidden {
            display: none;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: #333;
            color: #fff;
            border-radius: 6px;
            font-size: 13px;
            z-index: 300;
            animation: fadeIn 0.3s;
        }

        .toast.success { background: #52c41a; }
        .toast.error { background: #ff4d4f; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(-8px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Markdown样式 */
        .message-bubble strong { color: #1677ff; font-weight: 600; }
        .message-bubble ul, .message-bubble ol { margin: 3px 0; padding-left: 14px; }
        .message-bubble li { margin: 1px 0; }
        .message-bubble h3 { font-size: 14px; margin: 3px 0; font-weight: 600; }
        .message-bubble h2 { font-size: 15px; margin: 3px 0; font-weight: 600; }
        .message-bubble p { margin: 1px 0; }

        /* 决议面板样式 */
        .resolution-panel {
            background: #fff;
            border: 2px solid #1677ff;
            border-radius: 12px;
            padding: 16px;
            margin: 12px 0;
            box-shadow: 0 2px 8px rgba(22,119,255,0.15);
        }
        .resolution-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e8e8e8;
        }
        .resolution-title {
            font-size: 16px;
            font-weight: 600;
            color: #1677ff;
        }
        .resolution-toggle {
            font-size: 12px;
            color: #666;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            background: #f5f5f5;
        }
        .resolution-toggle:hover { background: #e8e8e8; }
        .resolution-content { }
        .resolution-content.collapsed { display: none; }

        .resolution-section {
            margin-bottom: 12px;
        }
        .section-header {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .section-header.consensus { color: #52c41a; }
        .section-header.divergence { color: #faad14; }
        .section-header.risk { color: #ff4d4f; }
        .section-header.action { color: #1677ff; }
        .section-header.overall { color: #722ed1; }

        .section-items {
            font-size: 13px;
            color: #333;
            line-height: 1.6;
        }
        .section-items li { margin: 2px 0; }

        /* 风险地图 */
        .risk-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 8px;
        }
        .risk-card {
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        .risk-card.low {
            background: #f6ffed;
            border: 1px solid #b7eb8f;
        }
        .risk-card.medium {
            background: #fffbe6;
            border: 1px solid #ffe58f;
        }
        .risk-card.high {
            background: #fff2f0;
            border: 1px solid #ffccc7;
        }
        .risk-card .risk-label {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .risk-card .risk-items {
            font-size: 11px;
            color: #666;
        }

        /* 红牌警告 */
        .red-flag-box {
            background: #fff2f0;
            border: 2px solid #ff4d4f;
            padding: 10px 12px;
            border-radius: 8px;
            margin-top: 10px;
        }
        .red-flag-box .flag-icon {
            color: #ff4d4f;
            font-weight: 600;
        }

        /* 行动建议 */
        .action-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .action-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 13px;
        }
        .action-term {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .action-term.short { background: #e6f7ff; color: #1890ff; }
        .action-term.mid { background: #f6ffed; color: #52c41a; }
        .action-term.long { background: #f9f0ff; color: #722ed1; }

        /* 总体判断 */
        .overall-box {
            background: #f0f5ff;
            border: 1px solid #adc6ff;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
            color: #333;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="chat-header">
        <div class="header-top">
            <a href="/" class="back-btn" target="_blank">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                <span>首页</span>
            </a>
            <div class="header-title">投研会议</div>
            <div style="width: 80px;"></div>
        </div>
        <div class="header-info" id="topicInfo">正在加载...</div>
    </header>

    <!-- 状态栏 -->
    <div class="status-bar">
        <div class="phase-indicator" id="phaseIndicator">
            <div class="phase-dot active">0</div>
            <div class="phase-dot">1</div>
            <div class="phase-dot">2</div>
            <div class="phase-dot">3</div>
            <div class="phase-dot">4</div>
            <div class="phase-dot">5</div>
        </div>
        <div class="phase-name" id="phaseName">议题接收</div>
        <div class="meeting-id" id="meetingId">-</div>
    </div>

    <!-- 聊天区域 -->
    <div class="chat-container" id="chatContainer">
        <div class="message system">
            <div class="system-bubble">正在启动投研会议...</div>
        </div>
    </div>

    <!-- 澄清问题弹框 -->
    <div class="modal-overlay hidden" id="quizModal">
        <div class="modal-box">
            <div class="modal-title">请选择投资偏好</div>
            <div id="quizContent"></div>
            <button class="modal-submit" id="quizSubmitBtn">确认选择</button>
        </div>
    </div>

    <!-- 底部操作区 -->
    <div class="action-bar hidden" id="actionBar">
        <button class="action-btn secondary" id="downloadBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
            </svg>
            <span>下载报告</span>
        </button>
        <button class="action-btn primary" id="newMeetingBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 5v14M5 12h14"/>
            </svg>
            <span>新议题</span>
        </button>
    </div>

    <script>
        const API_BASE = window.location.origin;
        const urlParams = new URLSearchParams(window.location.search);
        const meetingId = urlParams.get('meeting_id');
        const topic = urlParams.get('topic') || '投资分析';

        // DOM
        const chatContainer = document.getElementById('chatContainer');
        const topicInfo = document.getElementById('topicInfo');
        const phaseIndicator = document.getElementById('phaseIndicator');
        const phaseName = document.getElementById('phaseName');
        const meetingIdEl = document.getElementById('meetingId');
        const quizModal = document.getElementById('quizModal');
        const quizContent = document.getElementById('quizContent');
        const quizSubmitBtn = document.getElementById('quizSubmitBtn');
        const actionBar = document.getElementById('actionBar');

        // 状态
        let quizAnswers = {};
        let collectionChoices = [];
        let currentEventSource = null; // 当前活跃的SSE连接

        // 预定义选项
        const QUIZ_QUESTIONS = [
            {id: "time_horizon", question: "投资周期?", options: ["短期(<1年)", "中期(1-3年)", "长期(>3年)"], default: "长期(>3年)"},
            {id: "position_intent", question: "股票意向?", options: ["考虑买入", "持有观察", "考虑卖出", "仅做分析"], default: "仅做分析"},
            {id: "risk_tolerance", question: "风险承受?", options: ["保守", "均衡", "激进"], default: "均衡"}
        ];

        const COLLECTION_OPTIONS = [
            {id: "bocha", name: "博查网页搜索", desc: "新闻、研报、公告"},
            {id: "akshare", name: "Akshare行情", desc: "实时股价、财务数据"}
        ];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            topicInfo.textContent = topic;
            meetingIdEl.textContent = `ID: ${meetingId || '--'}`;
            if (meetingId) startDiscussion();
            else showError('会议ID缺失');
        });

        // 启动讨论
        function startDiscussion() {
            // 关闭之前的连接
            if (currentEventSource) {
                currentEventSource.close();
                currentEventSource = null;
            }
            currentEventSource = new EventSource(`${API_BASE}/api/meeting/${meetingId}/discuss`);
            currentEventSource.onmessage = e => handleSSE(JSON.parse(e.data));
            currentEventSource.onerror = () => {
                showError('连接中断');
                currentEventSource.close();
                currentEventSource = null;
            };
        }

        // 处理SSE消息
        function handleSSE(data) {
            if (data.type === 'error') return showError(data.message);
            if (data.phase) updatePhase(data.phase);

            switch (data.type) {
                case 'phase_update':
                    handlePhase(data);
                    break;
                case 'waiting_for_selection':
                    showQuizAndCollection();
                    break;
                case 'advisor_speaking':
                    showTyping(`${data.advisor_name} 发言中...`);
                    break;
                case 'advisor_opinion':
                    removeTyping();
                    addAdvisorMsg(data.data);
                    break;
                case 'round_summary':
                    addSystemMsg(`第${data.data?.round}轮完成，发言${data.data?.speakers_count}位`);
                    break;
                case 'resolution_generating':
                    showTyping('正在生成综合决议...');
                    break;
                case 'resolution':
                    removeTyping();
                    addResolution(data.data);
                    break;
                case 'complete':
                    actionBar.classList.remove('hidden');
                    addSystemMsg('投研会议完成!', true);
                    break;
            }
        }

        // 更新阶段
        function updatePhase(phase) {
            const n = parseInt(phase.replace('PHASE_', '')) || 0;
            const names = ['议题接收', '信息补全', '采集', '发言', '交锋', '决议'];
            phaseName.textContent = names[n] || '';
            phaseIndicator.querySelectorAll('.phase-dot').forEach((d, i) => {
                d.className = 'phase-dot';
                if (i < n) d.classList.add('completed');
                else if (i === n) d.classList.add('active');
            });
        }

        // 处理阶段更新
        function handlePhase(data) {
            const d = data.data;
            if (data.phase === 'PHASE_0') {
                addSystemMsg(`议题: ${d?.restated_topic || topic}`, true);
                if (d?.stock_name) addSystemMsg(`识别股票: ${d.stock_name}`);
            } else if (data.phase === 'PHASE_2') {
                const sd = d?.stock_data;
                if (sd?.price) addSystemMsg(`行情: ${sd.name} 价格${sd.price}元 涨跌${sd.change_pct}%`);
                if (d?.collection_results?.news?.content?.items?.length) {
                    const items = d.collection_results.news.content.items.slice(0, 2);
                    items.forEach(i => addSystemMsg(`资讯: ${i.title}`));
                }
            } else if (data.phase === 'PHASE_3') {
                addSystemMsg(`${d?.advisors?.length || 10}位顾问入场`);
            }
        }

        // 显示澄清问题+采集选项
        function showQuizAndCollection() {
            quizModal.classList.remove('hidden');

            // 初始化答案
            QUIZ_QUESTIONS.forEach(q => quizAnswers[q.id] = q.default);
            COLLECTION_OPTIONS.forEach(c => collectionChoices.push(c.id));

            quizContent.innerHTML = `
                <div style="border-bottom:1px solid #eee;margin-bottom:12px;padding-bottom:12px;">
                    <div style="font-size:12px;color:#666;margin-bottom:8px;">投资偏好</div>
                    ${QUIZ_QUESTIONS.map(q => `
                        <div class="modal-item">
                            <div class="modal-question">${q.question}</div>
                            <div class="modal-options">
                                ${q.options.map(o => `<button class="modal-option ${o===q.default?'selected':''}" data-q="${q.id}" data-v="${o}">${o}</button>`).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
                <div style="font-size:12px;color:#666;margin-bottom:8px;">信息采集方式</div>
                <div class="collection-cards">
                    ${COLLECTION_OPTIONS.map(c => `
                        <div class="collection-card selected" data-c="${c.id}">
                            <div class="card-name">${c.name}</div>
                            <div class="card-desc">${c.desc}</div>
                        </div>
                    `).join('')}
                </div>
            `;

            // 绑定选项点击
            quizContent.querySelectorAll('.modal-option').forEach(btn => {
                btn.onclick = e => {
                    const q = e.target.dataset.q;
                    quizContent.querySelectorAll(`[data-q="${q}"]`).forEach(b => b.classList.remove('selected'));
                    e.target.classList.add('selected');
                    quizAnswers[q] = e.target.dataset.v;
                };
            });

            // 绑定采集卡片点击
            quizContent.querySelectorAll('.collection-card').forEach(card => {
                card.onclick = e => {
                    const c = e.currentTarget.dataset.c;
                    e.currentTarget.classList.toggle('selected');
                    if (e.currentTarget.classList.contains('selected')) {
                        if (!collectionChoices.includes(c)) collectionChoices.push(c);
                    } else {
                        collectionChoices = collectionChoices.filter(x => x !== c);
                    }
                };
            });
        }

        // 提交选择
        quizSubmitBtn.onclick = async () => {
            if (collectionChoices.length === 0) {
                return showError('请选择至少一种采集方式');
            }

            quizModal.classList.add('hidden');
            addSystemMsg('正在采集信息...');
            showTyping('采集数据中...');

            try {
                // 提交投资偏好
                await fetch(`${API_BASE}/api/meeting/${meetingId}/quiz`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({answers: quizAnswers})
                });

                // 提交采集选项
                await fetch(`${API_BASE}/api/meeting/${meetingId}/collect`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({choices: collectionChoices})
                });

                addSystemMsg('开始讨论...');
                // 关闭旧的SSE连接，创建新的连接继续讨论
                if (currentEventSource) {
                    currentEventSource.close();
                    currentEventSource = null;
                }
                currentEventSource = new EventSource(`${API_BASE}/api/meeting/${meetingId}/continue`);
                currentEventSource.onmessage = e => handleSSE(JSON.parse(e.data));
                currentEventSource.onerror = () => {
                    showError('讨论连接中断');
                    currentEventSource.close();
                    currentEventSource = null;
                };

            } catch (err) {
                showError('提交失败: ' + err.message);
            }
        };

        // 添加消息
        function addSystemMsg(text, highlight = false) {
            const msg = document.createElement('div');
            msg.className = 'message system';
            msg.innerHTML = `<div class="system-bubble ${highlight?'highlight':''}">${text}</div>`;
            chatContainer.appendChild(msg);
            scrollBottom();
        }

        function addAdvisorMsg(data) {
            const name = data?.advisor_name || '顾问';
            const opinion = data?.opinion || '';
            const conf = data?.confidence || 0.7;

            let content = opinion.replace(/\n/g, '<br>').replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

            let avatarClass = '';
            if (name.includes('巴菲特')||name.includes('格雷厄姆')||name.includes('芒格')) avatarClass='value';
            else if (name.includes('尼森')||name.includes('勒菲弗')) avatarClass='tech';
            else if (name.includes('王琛')) avatarClass='quant';

            const msg = document.createElement('div');
            msg.className = 'message advisor';
            msg.innerHTML = `
                <div class="avatar ${avatarClass}">${name[0]}</div>
                <div class="message-content">
                    <div class="message-name">${name}</div>
                    <div class="message-bubble">${content}</div>
                    <div class="message-meta">置信度 ${Math.round(conf*100)}%</div>
                </div>
            `;
            chatContainer.appendChild(msg);
            scrollBottom();
        }

        function addResolution(data) {
            const panel = document.createElement('div');
            panel.className = 'message system';
            panel.innerHTML = buildResolutionPanel(data);
            chatContainer.appendChild(panel);
            scrollBottom();

            // 绑定折叠/展开按钮
            const toggleBtn = panel.querySelector('.resolution-toggle');
            const content = panel.querySelector('.resolution-content');
            if (toggleBtn && content) {
                toggleBtn.onclick = () => {
                    content.classList.toggle('collapsed');
                    toggleBtn.textContent = content.classList.contains('collapsed') ? '展开' : '折叠';
                };
            }
        }

        function buildResolutionPanel(data) {
            const consensus = data?.consensus || [];
            const divergence = data?.divergence || [];
            const riskMap = data?.risk_map || {};
            const actionAdvice = data?.action_advice || {};
            const overall = data?.overall_judgment || '';
            const consensusView = data?.consensus_view || '';
            const ratio = data?.ratio || 0;

            return `
                <div class="resolution-panel">
                    <div class="resolution-header">
                        <span class="resolution-title">📋 投研会议决议</span>
                        <span class="resolution-toggle">折叠</span>
                    </div>
                    <div class="resolution-content">
                        <!-- 共识 -->
                        <div class="resolution-section">
                            <div class="section-header consensus">✅ 共识观点</div>
                            <ul class="section-items">
                                ${consensus.length > 0 ? consensus.map(c => `<li>${c}</li>`).join('') : '<li>顾问们进行了深入讨论</li>'}
                            </ul>
                        </div>

                        <!-- 分歧 -->
                        ${divergence.length > 0 ? `
                        <div class="resolution-section">
                            <div class="section-header divergence">⚠️ 存在分歧</div>
                            <ul class="section-items">
                                ${divergence.map(d => `<li>${d}</li>`).join('')}
                            </ul>
                        </div>
                        ` : ''}

                        <!-- 风险地图 -->
                        <div class="resolution-section">
                            <div class="section-header risk">🗺️ 风险地图</div>
                            <div class="risk-grid">
                                <div class="risk-card low">
                                    <div class="risk-label">🟢 低风险</div>
                                    <div class="risk-items">
                                        ${(riskMap.low || []).length > 0 ? riskMap.low.map(r => `<div>${r}</div>`).join('') : '<div>-</div>'}
                                    </div>
                                </div>
                                <div class="risk-card medium">
                                    <div class="risk-label">🟡 中风险</div>
                                    <div class="risk-items">
                                        ${(riskMap.medium || []).length > 0 ? riskMap.medium.map(r => `<div>${r}</div>`).join('') : '<div>-</div>'}
                                    </div>
                                </div>
                                <div class="risk-card high">
                                    <div class="risk-label">🔴 高风险</div>
                                    <div class="risk-items">
                                        ${(riskMap.high || []).length > 0 ? riskMap.high.map(r => `<div>${r}</div>`).join('') : '<div>-</div>'}
                                    </div>
                                </div>
                            </div>
                            ${riskMap.red_flag ? `
                            <div class="red-flag-box">
                                <span class="flag-icon">🚨 红牌警告</span>
                                <div style="font-size:12px;color:#a31d15;margin-top:4px;">${riskMap.red_flag}</div>
                            </div>
                            ` : ''}
                        </div>

                        <!-- 行动建议 -->
                        <div class="resolution-section">
                            <div class="section-header action">💡 行动建议</div>
                            <div class="action-grid">
                                ${(actionAdvice.short_term || []).length > 0 ? `
                                <div class="action-item">
                                    <span class="action-term short">📅 短期</span>
                                    <span>${actionAdvice.short_term.join('; ')}</span>
                                </div>
                                ` : ''}
                                ${(actionAdvice.mid_term || []).length > 0 ? `
                                <div class="action-item">
                                    <span class="action-term mid">📆 中期</span>
                                    <span>${actionAdvice.mid_term.join('; ')}</span>
                                </div>
                                ` : ''}
                                ${(actionAdvice.long_term || []).length > 0 ? `
                                <div class="action-item">
                                    <span class="action-term long">📈 长期</span>
                                    <span>${actionAdvice.long_term.join('; ')}</span>
                                </div>
                                ` : ''}
                            </div>
                        </div>

                        <!-- 总体判断 -->
                        <div class="resolution-section">
                            <div class="section-header overall">🎯 总体判断</div>
                            <div class="overall-box">${overall || '综合分析完成，建议结合个人风险偏好做出决策。'}</div>
                        </div>

                        <!-- 统计信息 -->
                        <div style="margin-top:10px;font-size:12px;color:#999;text-align:right;">
                            共识倾向: ${consensusView} (${Math.round(ratio*100)}%共识)
                        </div>
                    </div>
                </div>
            `;
        }

        // 加载指示器
        function showTyping(text) {
            removeTyping();
            const t = document.createElement('div');
            t.id = 'typingIndicator';
            t.className = 'message system';
            t.innerHTML = `<div class="typing-indicator"><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div><span class="typing-text">${text}</span></div>`;
            chatContainer.appendChild(t);
            scrollBottom();
        }

        function removeTyping() {
            const t = document.getElementById('typingIndicator');
            if (t) t.remove();
        }

        function scrollBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showError(text) {
            const toast = document.createElement('div');
            toast.className = 'toast error';
            toast.textContent = text;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // 下载报告
        document.getElementById('downloadBtn').onclick = async () => {
            try {
                const res = await fetch(`${API_BASE}/api/meeting/${meetingId}/report`, {method: 'POST'});
                const d = await res.json();
                const html = `<html><head><meta charset="UTF-8"><title>投研报告</title><style>body{font-family:sans-serif;padding:20px}</style></head><body>${d.report_html}</body></html>`;
                const blob = new Blob([html], {type: 'text/html'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `投研报告_${meetingId}.html`;
                a.click();
            } catch (e) {
                showError('生成报告失败');
            }
        };

        // 新议题
        document.getElementById('newMeetingBtn').onclick = () => window.open('/', '_blank');
    </script>
</body>
</html>
