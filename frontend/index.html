<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaMind 投研会 - AI投资专家圆桌会议</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Markdown渲染库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- 全屏按钮（固定位置） -->
    <button class="fullscreen-btn" id="fullscreenBtn" title="全屏模式">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
        </svg>
    </button>

    <!-- 顶部导航栏 -->
    <header class="top-header">
        <div class="header-content">
            <div class="brand">
                <div class="brand-logo">
                    <svg viewBox="0 0 32 32" width="32" height="32">
                        <circle cx="16" cy="16" r="14" fill="none" stroke="currentColor" stroke-width="2"/>
                        <path d="M8 16 L12 12 L16 16 L20 12 L24 16" stroke="currentColor" stroke-width="2" fill="none"/>
                        <circle cx="16" cy="20" r="2" fill="currentColor"/>
                    </svg>
                </div>
                <div class="brand-text">
                    <span class="brand-name">AlphaMind</span>
                    <span class="brand-desc">投研会</span>
                </div>
            </div>
            <nav class="top-nav">
                <a href="#" class="nav-link active">投研会</a>
                <a href="#" class="nav-link">顾问团队</a>
                <a href="#" class="nav-link">历史会议</a>
            </nav>
            <div class="header-actions">
                <button class="btn-icon" title="设置">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z" fill="none" stroke="currentColor" stroke-width="2"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- 主内容区域 -->
    <main class="main-content">
        <!-- Hero区域 - 输入区 -->
        <section class="hero-section">
            <div class="hero-bg">
                <div class="hero-gradient"></div>
                <div class="hero-pattern"></div>
            </div>
            <div class="hero-content">
                <div class="hero-title">
                    <h1>邀请<span class="highlight">10位顶级投资专家</span></h1>
                    <h2>为你把问题想透彻</h2>
                </div>
                <p class="hero-desc">
                    本杰明·格雷厄姆、沃伦·巴菲特、查理·芒格、彼得·林奇...<br>
                    让他们齐聚一堂，为你分析投资决策
                </p>

                <!-- 输入框 -->
                <div class="input-wrapper">
                    <div class="input-box">
                        <div class="input-icon">
                            <svg viewBox="0 0 24 24" width="24" height="24"><circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                        </div>
                        <textarea id="topicInput" placeholder="输入你的投资问题，例如：格力当前价格值不值买入？" rows="2"></textarea>
                        <button id="startBtn" class="btn-start">
                            <span class="btn-text">开始投研会</span>
                            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M5 12h14M12 5l7 7-7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </button>
                    </div>
                    <div class="input-examples">
                        <span class="examples-label">试试这些：</span>
                        <div class="example-tags">
                            <button class="tag-btn" onclick="setExample('格力电器当前估值是否合理？')">格力估值分析</button>
                            <button class="tag-btn" onclick="setExample('贵州茅台还能长期持有吗？')">茅台持仓判断</button>
                            <button class="tag-btn" onclick="setExample('比亚迪未来三年成长空间如何？')">比亚迪成长分析</button>
                            <button class="tag-btn" onclick="setExample('宁德时代的技术壁垒有多强？')">宁德时代护城河</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 顾问团队展示 -->
        <section class="advisors-section" id="advisorsSection">
            <div class="section-header">
                <h2 class="section-title">投资专家团队</h2>
                <p class="section-desc">10位顶级顾问，每位保持独特的投资哲学和分析视角</p>
            </div>
            <div class="advisors-grid" id="advisorsGrid">
                <!-- 动态加载顾问卡片 -->
            </div>
        </section>

        <!-- 会议流程区 -->
        <section class="meeting-section" id="meetingSection" style="display: none;">
            <!-- 阶段进度条 -->
            <div class="phase-progress-bar">
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <div class="phase-steps">
                    <div class="phase-step" data-phase="0">
                        <div class="step-circle">0</div>
                        <span class="step-label">议题接收</span>
                    </div>
                    <div class="phase-step" data-phase="1">
                        <div class="step-circle">1</div>
                        <span class="step-label">信息补全</span>
                    </div>
                    <div class="phase-step" data-phase="2">
                        <div class="step-circle">2</div>
                        <span class="step-label">选席</span>
                    </div>
                    <div class="phase-step" data-phase="3">
                        <div class="step-circle">3</div>
                        <span class="step-label">发言</span>
                    </div>
                    <div class="phase-step" data-phase="4">
                        <div class="step-circle">4</div>
                        <span class="step-label">交锋</span>
                    </div>
                    <div class="phase-step" data-phase="5">
                        <div class="step-circle">5</div>
                        <span class="step-label">决议</span>
                    </div>
                </div>
            </div>

            <!-- 会议内容区 -->
            <div class="meeting-content">
                <!-- 左侧：参与的顾问 -->
                <aside class="meeting-sidebar">
                    <div class="sidebar-title">参与顾问</div>
                    <div class="sidebar-advisors" id="selectedAdvisors">
                        <!-- 动态加载 -->
                    </div>
                    <div class="tension-pairs" id="tensionPairs">
                        <div class="tension-title">张力对</div>
                        <!-- 动态加载 -->
                    </div>
                </aside>

                <!-- 右侧：讨论流 -->
                <div class="meeting-stream">
                    <div class="stream-header">
                        <span class="meeting-id">会议ID: <strong id="meetingId">-</strong></span>
                        <span class="current-phase" id="phaseName">Phase 0</span>
                    </div>
                    <div class="stream-content" id="discussionStream">
                        <!-- 实时讨论内容 -->
                    </div>

                    <!-- 问答区 (Phase 1) -->
                    <div class="qa-section" id="qaSection" style="display: none;">
                        <div class="qa-title">请回答以下问题</div>
                        <div class="qa-list" id="qaList"></div>
                        <button class="btn-submit" id="submitAnswersBtn">提交回答，继续分析</button>
                    </div>

                    <!-- 报告生成按钮 -->
                    <div class="report-action" id="reportSection" style="display: none;">
                        <button class="btn-report" id="generateReportBtn">
                            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" fill="none" stroke="currentColor" stroke-width="2"/><polyline points="14 2 14 8 20 8" fill="none" stroke="currentColor" stroke-width="2"/><line x1="16" y1="13" x2="8" y2="13" stroke="currentColor" stroke-width="2"/><line x1="16" y1="17" x2="8" y2="17" stroke="currentColor" stroke-width="2"/><polyline points="10 9 9 9 8 9" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                            <span>生成完整报告</span>
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 报告弹窗 -->
    <div class="modal-overlay" id="reportModal">
        <div class="modal-container">
            <div class="modal-header">
                <h3>投研会报告</h3>
                <button class="modal-close" onclick="closeModal()">
                    <svg viewBox="0 0 24 24" width="24" height="24"><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2"/><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2"/></svg>
                </button>
            </div>
            <div class="modal-body" id="reportContent"></div>
            <div class="modal-footer">
                <button class="btn-download" onclick="downloadReport()">下载报告</button>
            </div>
        </div>
    </div>

    <!-- 底部 -->
    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-brand">AlphaMind 投研会</div>
            <div class="footer-links">
                <a href="#">关于我们</a>
                <a href="#">使用指南</a>
                <a href="#">隐私政策</a>
            </div>
            <div class="footer-copyright">© 2024 AlphaMind. AI驱动投资决策辅助工具</div>
        </div>
    </footer>

    <script src="/js/app.js"></script>
</body>
</html>
